# Site settings
course_name: Agentic AI
course_description: " In this course, we will explore the foundations, architectures, 
and real-world applications of agentic AI systems capable of autonomous reasoning, 
planning, and action. You will learn how modern AI Agents go beyond single prompts: 
they think and plan, use tools and data, act in the world, and learn from feedback. 
You will dive into the core principles that empower AI to act with purpose, 
adapt to complex environments, and collaborate with humans in meaningful ways. 
Along the way, you will gain insights into how agentic AI operates under the hood: 
from perception and planning to learning and decision-making.
"
course_semester: "Spring 2026"

baseurl: "/CAI4520" # the subpath of your site, e.g. /blog/
url: "https://myrespect.github.io/" # the base hostname & protocol for your site

schoolname: "University of South Florida"
schoolurl: "https://usf.edu"
twitter_username: 

address: |
    Bellini College of AI, Cybersecurity and Computing
    University of South Florida
    Tampa, Florida

# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
